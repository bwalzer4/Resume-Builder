- name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0
          pip install weasyprint jinja2 google-genai

      - name: Run Tailor Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python tailor_resume.py --company "Google" --jd "Your JD text here"
