name: Tailor Resume
on:
  workflow_dispatch:
    inputs:
      company_name:
        description: 'Target Company (e.g., Google, Amazon, Deloitte)'
        required: true
      job_description:
        description: 'Paste the Job Description here'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install google-genai rendercv

      - name: Run Tailor Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python tailor_resume.py \
            --company "${{ github.event.inputs.company_name }}" \
            --jd "${{ github.event.inputs.job_description }}"

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # This '|| true' prevents the workflow from crashing if nothing changed
          git add outputs/ || echo "No new outputs to add"
          git commit -m "New tailored resume for ${{ github.event.inputs.company_name }}" || echo "No changes to commit"
          git push || echo "Nothing to push"
          git commit -m "Generated resume for ${{ github.event.inputs.company_name }}"
          git push
