name: Tailor Resume
on:
  workflow_dispatch:
    inputs:
      job_description:
        description: 'Paste the Job Description here'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python_version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-generativeai

      - name: Run Tailor Script
        # This line connects your Secret to the Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python tailor_resume.py --jd "${{ github.event.inputs.job_description }}"

      - name: Commit and Push Tailored JSON
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add tailored_resume.json
          git commit -m "Automated: Tailored resume for new JD"
          git push
